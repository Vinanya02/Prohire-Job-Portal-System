<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details | ProHire</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1a5f7a; 
            --accent: #3498db;
            --dark-blue: #0a192f; /* Framework Dark Blue */
            --glass: rgba(255, 255, 255, 0.95); 
            --bg-bottom: #f4f7f9; 
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; }

        /* Unified Dark Blue Framework Background */
        .bg-layer { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            background: radial-gradient(circle at center, #112240 0%, var(--dark-blue) 100%);
        }

        /* Top Overlay to maintain the consistent "ProHire" look */
        .bg-top-overlay { 
            position: absolute;
            top: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(rgba(10, 25, 47, 0.8), rgba(10, 25, 47, 0.8)), 
                        url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            opacity: 0.4;
        }

        .wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 1; }
        
        .desc-container { 
            width: 95%; 
            max-width: 900px; 
            background: var(--glass); 
            border-radius: 24px; 
            padding: 50px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            backdrop-filter: blur(10px);
        }

        .scroll-ui { background: white; border: 1px solid #ddd; border-radius: 15px; padding: 40px; margin-top: 20px; line-height: 1.8; color: #444; }
        
        .apply-btn { 
            background: var(--primary); 
            color: white; 
            padding: 12px 40px; 
            border-radius: 8px; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            float: right; 
            margin-top: 20px;
            transition: 0.3s ease;
        }

        .apply-btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        .back-link {
            text-decoration: none; 
            color: var(--primary); 
            font-weight: 600;
            display: inline-block;
            transition: 0.2s;
        }
        
        .back-link:hover { color: var(--accent); }

        /* Additional Styling for list consistency */
        #reqList {
            padding-left: 20px;
        }
        #reqList li {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="bg-layer">
        <div class="bg-top-overlay"></div>
    </div>

    <div class="wrapper">
        <div class="desc-container">
            <a href="job.html" class="back-link">← Back to Jobs</a>
            
            <div style="display: flex; align-items: center; gap: 20px; margin-top: 20px;">
                <div id="compLogo" style="width:80px; height:80px; background:var(--primary); color:white; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:1.5rem;">L</div>
                <div>
                    <h1 id="jobTitle" style="margin:0; color:var(--primary);">Job Title</h1>
                    <p id="compName" style="margin:0; color:#666;">Company Name</p>
                </div>
            </div>

            <div class="scroll-ui">
                <h3 style="margin-top: 0;">Job Description</h3>
                <p id="jobFullDesc">Loading job details...</p>
                
                <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">
                
                <h3>Requirements</h3>
                <ul id="reqList"></ul>

                <button class="apply-btn" id="mainApplyBtn" onclick="applyNow()">Apply Now</button>
                <div style="clear:both;"></div>
            </div>
        </div>
    </div>

    <script>
        // Database for hardcoded jobs mapping to provide rich data if details are missing
        const jobDataMapping = {
            "ui-google": { 
                title: "UI/UX Designer", 
                company: "Google", 
                desc: "Design interfaces for billions of users. Expertise in Figma and accessibility is required.",
                reqs: ["3+ years of UX design experience", "Mastery of Figma", "Portfolio required"],
                url: "apply.html" 
            },
            "fe-meta": { 
                title: "Frontend Dev", 
                company: "Meta", 
                desc: "Build social features with React. Scale web performance for massive user bases.",
                reqs: ["Expert knowledge of React", "Large-scale CSS experience", "Performance optimization"],
                url: "apply.html" 
            },
            "be-amazon": {
                title: "Backend Engineer",
                company: "Amazon",
                desc: "Build robust server-side logic and handle massive cloud infrastructure using AWS services.",
                reqs: ["Strong experience with Node.js or Python", "Understanding of Distributed Systems", "AWS Certification preferred"],
                url: "apply.html"
            }
        };

        let currentJob = null;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('jobId');
            const storedJob = JSON.parse(localStorage.getItem('selectedJob'));

            // Check if we have a direct ID from URL or a stored job object from job.html
            if (id && jobDataMapping[id]) {
                currentJob = jobDataMapping[id];
            } else if (storedJob) {
                // Check if the stored job matches a known static job to get its URL/Reqs
                const findKey = Object.keys(jobDataMapping).find(key => 
                    jobDataMapping[key].title === storedJob.title && 
                    jobDataMapping[key].company === storedJob.company
                );
                
                if (findKey) {
                    currentJob = jobDataMapping[findKey];
                } else {
                    // It's an admin-created job or a dynamic post
                    currentJob = {
                        title: storedJob.title,
                        company: storedJob.company,
                        desc: storedJob.desc || "No description available.",
                        reqs: storedJob.reqs || ["Proven experience in relevant field", "Strong communication skills", "Team player"],
                        url: storedJob.url || "apply.html"
                    };
                }
            }

            if (currentJob) {
                renderJob(currentJob.title, currentJob.company, currentJob.desc, currentJob.reqs);
            } else {
                document.getElementById('jobFullDesc').innerText = "Job details could not be loaded. Please return to the dashboard.";
            }
        }

        function renderJob(title, company, desc, reqs) {
            document.getElementById('jobTitle').innerText = title;
            document.getElementById('compName').innerText = company;
            document.getElementById('compLogo').innerText = company[0].toUpperCase();
            document.getElementById('jobFullDesc').innerText = desc;
            
            const reqList = document.getElementById('reqList');
            reqList.innerHTML = ""; 
            if (reqs && reqs.length > 0) {
                reqs.forEach(req => {
                    const li = document.createElement('li');
                    li.innerText = req;
                    reqList.appendChild(li);
                });
            }
        }

        function applyNow() {
            if (!currentJob) {
                alert("Error: Job data not found.");
                return;
            }

            // 1. Register application in LocalStorage
            const applications = JSON.parse(localStorage.getItem('myApplications')) || [];
            const alreadyApplied = applications.some(app => app.title === currentJob.title && app.company === currentJob.company);
            
            if (!alreadyApplied) {
                const newApp = {
                    title: currentJob.title,
                    company: currentJob.company,
                    date: new Date().toLocaleDateString()
                };
                applications.push(newApp);
                localStorage.setItem('myApplications', JSON.stringify(applications));
            }

            // 2. Visual and Alert Feedback
            alert(`Success! Your application for ${currentJob.title} at ${currentJob.company} has been registered.`);
            
            const btn = document.getElementById('mainApplyBtn');
            btn.innerText = "Redirecting...";
            btn.style.background = "#27ae60";
            btn.disabled = true;

            // 3. Redirection Logic - Corrected to apply.html
            const targetUrl = currentJob.url || "apply.html";
            
            console.log("Redirecting to:", targetUrl);

            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1000);
        }
    </script>
</body>
</html>
