<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProHire | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f7a;
            --accent: #3498db;
            --glass: rgba(255, 255, 255, 0.95);
            --bg-bottom: #f4f7f9;
            --text-dark: #2c3e50;
        }

        body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Inter', sans-serif; }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; display: flex; flex-direction: column;
        }
        .bg-top {
            height: 80%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=2070');
            background-size: cover; background-position: center;
        }
        .bg-bottom { height: 20%; background-color: var(--bg-bottom); }

        .wrapper { min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }

        .main-dashboard {
            width: 95%; max-width: 1200px;
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 24px; padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            height: fit-content;
        }

        .top-nav {
            display: grid; grid-template-columns: auto 1fr auto auto auto;
            align-items: center; gap: 20px; margin-bottom: 20px;
        }

        .user-avatar {
            width: 65px; height: 65px; background: var(--primary);
            color: white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-weight: 600; font-size: 1.4rem; text-decoration: none;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(26, 95, 122, 0.3);
            text-transform: uppercase;
        }

        .search-container input {
            width: 100%; padding: 16px 25px; border-radius: 30px;
            border: 2px solid #eee; outline: none; font-size: 1rem;
        }

        .nav-btn {
            background: white; border: 2px dashed var(--primary);
            padding: 8px 15px; border-radius: 12px;
            text-decoration: none; color: var(--primary);
            font-weight: 600; text-align: center; font-size: 0.85rem;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 45px;
            min-width: 80px;
        }
        
        .nav-btn:hover {
            background: var(--primary);
            color: white;
            border-style: solid;
        }

        .welcome-section h2 { margin: 0 0 25px 0; color: var(--text-dark); }
        .welcome-section span { color: var(--accent); text-transform: capitalize; }

        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .job-card {
            background: white; padding: 22px; border-radius: 18px;
            border: 1px solid #f0f0f0; transition: 0.3s; cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .job-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .job-card h3 { margin: 12px 0 6px; color: var(--primary); font-size: 1.05rem; }
        .badge { background: #eef2f3; color: var(--primary); padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 700; }
    </style>
</head>
<body>

    <div class="bg-layer"><div class="bg-top"></div><div class="bg-bottom"></div></div>

    <div class="wrapper">
        <div class="main-dashboard">
            <header class="top-nav">
                <a href="user.html" class="user-avatar" id="userAvatar">U</a>
                
                <div class="search-container">
                    <input type="text" id="searchBar" placeholder="Search latest jobs..." onkeyup="searchJobs()">
                </div>
                
                <a href="builder.html" class="nav-btn">📄<br>Builder</a>

                <a href="apply.html" class="nav-btn">✔️<br>Applied jobs</a>
            </header>

            <div class="welcome-section">
                <h2>Welcome back, <span id="displayName">User</span>!</h2>
            </div>

            <h3 id="resultTitle" style="margin-bottom: 25px; color: var(--text-dark);">Latest Job Openings</h3>

            <div class="job-grid" id="jobGrid">
                <div class="job-card" data-keywords="ui ux designer google" onclick="selectJob('UI/UX Designer', 'Google', 'Mountain View, CA', 'Design interfaces for billions of users. Expertise in Figma and accessibility is required.')">
                    <span class="badge">DESIGN</span>
                    <h3>UI/UX Designer</h3>
                    <p><strong>Google</strong><br>Mountain View, CA</p>
                </div>
                
                <div class="job-card" data-keywords="frontend developer meta react" onclick="selectJob('Frontend Dev', 'Meta', 'Menlo Park, CA', 'Build social features with React. Scale web performance for massive user bases.')">
                    <span class="badge">TECH</span>
                    <h3>Frontend Dev</h3>
                    <p><strong>Meta</strong><br>Menlo Park, CA</p>
                </div>
                
                <div class="job-card" data-keywords="backend engineer amazon aws" onclick="selectJob('Backend Engineer', 'Amazon', 'Seattle, WA', 'Build robust server-side logic and handle massive cloud infrastructure.')">
                    <span class="badge">TECH</span>
                    <h3>Backend Engineer</h3>
                    <p><strong>Amazon</strong><br>Seattle, WA</p>
                </div>
                </div>
        </div>
    </div>

    <script>
        
        window.onload = function() {
            const name = localStorage.getItem('userName') || "Guest";
            document.getElementById('displayName').innerText = name;
            document.getElementById('userAvatar').innerText = name.charAt(0).toUpperCase();

            loadAdminJobs();
        };

        function loadAdminJobs() {
            const adminJobs = JSON.parse(localStorage.getItem('portalJobs')) || [];
            const jobGrid = document.getElementById('jobGrid');

            adminJobs.forEach(job => {
                const jobCard = document.createElement('div');
                jobCard.className = 'job-card';
                
                jobCard.setAttribute('data-keywords', `${job.title} ${job.company} ${job.desc}`.toLowerCase());
                
                jobCard.onclick = function() {
                    const jobDetails = {
                        title: job.title,
                        company: job.company,
                        location: "Remote / Posted by Admin",
                        desc: job.desc
                    };
                    localStorage.setItem('selectedJob', JSON.stringify(jobDetails));
                    window.location.href = 'describe.html';
                };

                jobCard.innerHTML = `
                    <span class="badge" style="background:#e3f2fd; color:#1976d2;">NEW POST</span>
                    <h3>${job.title}</h3>
                    <p><strong>${job.company}</strong><br>Posted: ${job.date || 'Recently'}</p>
                `;
                
                jobGrid.prepend(jobCard);
            });
        }

        // ERROR FIXED: Added "desc" parameter so hardcoded jobs display details correctly
        function selectJob(title, company, location, desc) {
            const jobDetails = {
                title: title,
                company: company,
                location: location,
                desc: desc
            };
            localStorage.setItem('selectedJob', JSON.stringify(jobDetails));
            window.location.href = 'describe.html';
        }

        function searchJobs() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const cards = document.querySelectorAll('.job-card');
            cards.forEach(card => {
                const keywords = card.getAttribute('data-keywords') || "";
                card.style.display = keywords.includes(query) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
